<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a0a2e; overflow: hidden; font-family: 'Arial Black', sans-serif; }
#gameCanvas { display: block; }
#ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
#hud { display: flex; justify-content: space-between; padding: 10px 16px; align-items: flex-start; }
.player-hud { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
.player-name { font-size: 13px; font-weight: 900; color: #fff; text-shadow: 0 0 8px currentColor; letter-spacing: 1px; }
.hp-bar-bg { height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; }
.hp-bar { height: 100%; border-radius: 5px; transition: width 0.1s; }
.super-bar-bg { height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; border: 1px solid rgba(255,255,255,0.15); overflow: hidden; }
.super-bar { height: 100%; border-radius: 3px; transition: width 0.1s; }
.controls-hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-size: 11px; text-align: center; pointer-events: none; }
#center-hud { text-align: center; }
.round-info { color: rgba(255,255,255,0.7); font-size: 12px; }
#message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #FFD700; font-size: 32px; font-weight: 900; text-shadow: 0 0 20px #FFD700, 0 2px 4px #000; text-align: center; pointer-events: none; display: none; }
#charSelect { position: absolute; inset: 0; background: linear-gradient(135deg, #0a0015 0%, #1a0a2e 50%, #0a1520 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
#charSelect h1 { color: #FFD700; font-size: 28px; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 20px #FFD700; }
#charSelect p { color: rgba(255,255,255,0.6); font-size: 13px; }
.char-cards { display: flex; gap: 16px; }
.char-card { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 16px; width: 150px; text-align: center; cursor: pointer; transition: all 0.2s; }
.char-card:hover { border-color: #FFD700; background: rgba(255,215,0,0.1); transform: translateY(-4px); }
.char-card.selected { border-color: #00FF88; background: rgba(0,255,136,0.1); }
.char-emoji { font-size: 40px; margin-bottom: 8px; }
.char-card-name { color: #fff; font-size: 14px; font-weight: 900; }
.char-card-rarity { font-size: 11px; margin-top: 4px; }
.char-card-desc { color: rgba(255,255,255,0.5); font-size: 10px; margin-top: 6px; line-height: 1.4; }
.rarity-master { color: #FF4444; }
.rarity-legend { color: #FFD700; }
.rarity-raro { color: #4488FF; }
#startBtn { background: #FFD700; color: #000; border: none; padding: 14px 40px; font-size: 16px; font-weight: 900; border-radius: 8px; cursor: pointer; letter-spacing: 2px; transition: all 0.2s; }
#startBtn:hover { background: #FFF; transform: scale(1.05); }
#startBtn:disabled { opacity: 0.4; cursor: not-allowed; }
.p1-select, .p2-select { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.p1-select h3 { color: #4FC3F7; font-size: 13px; }
.p2-select h3 { color: #FF7043; font-size: 13px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud">
    <div class="player-hud" id="p1hud">
      <div class="player-name" style="color:#4FC3F7;" id="p1name">TROY</div>
      <div class="hp-bar-bg"><div class="hp-bar" id="p1hp" style="background:#4FC3F7; width:100%;"></div></div>
      <div class="super-bar-bg"><div class="super-bar" id="p1super" style="background:#FFD700; width:0%;"></div></div>
    </div>
    <div id="center-hud">
      <div class="round-info" id="roundInfo">Ronda 1</div>
    </div>
    <div class="player-hud" style="align-items:flex-end;" id="p2hud">
      <div class="player-name" style="color:#FF7043;" id="p2name">RAGNAR</div>
      <div class="hp-bar-bg" style="width:160px;"><div class="hp-bar" id="p2hp" style="background:#FF7043; width:100%;"></div></div>
      <div class="super-bar-bg" style="width:160px;"><div class="super-bar" id="p2super" style="background:#FFD700; width:0%;"></div></div>
    </div>
  </div>
  <div id="message"></div>
  <div class="controls-hint">P1: WASD + F(básico) + G(ulti) &nbsp;|&nbsp; P2: ↑↓←→ + L(básico) + ;(ulti)</div>
</div>

<div id="charSelect">
  <h1>⚔ SOLDIERS LEGENDS ⚔</h1>
  <p>Selecciona tu brawler</p>
  <div style="display:flex; gap:40px;">
    <div class="p1-select">
      <h3>JUGADOR 1</h3>
      <div class="char-cards" id="p1cards"></div>
    </div>
    <div class="p2-select">
      <h3>JUGADOR 2</h3>
      <div class="char-cards" id="p2cards"></div>
    </div>
  </div>
  <button id="startBtn" disabled>¡LUCHAR!</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const CHARS = {
  troy: {
    name: 'Troy', rarity: 'Master', color: '#4FC3F7', emoji: '🤠',
    hp: 8000, speed: 3.5, attackRange: 300, attackDamage: 1800, attackCooldown: 60,
    superDamage: 3600, superRange: 350, superCooldown: 120,
    attackColor: '#FFD700', superColor: '#FF6600',
    desc: 'Vaquero con lazo. Ataque a distancia.',
    drawFn: drawTroy
  },
  ragnar: {
    name: 'Ragnar', rarity: 'Leyenda', color: '#FF7043', emoji: '🐺',
    hp: 10000, speed: 4, attackRange: 90, attackDamage: 3000, attackCooldown: 45,
    superDamage: 0, superRange: 600, superCooldown: 100,
    attackColor: '#FF4444', superColor: '#8B00FF',
    desc: 'Lobo feroz. Cuerpo a cuerpo devastador.',
    drawFn: drawRagnar
  },
  trix: {
    name: 'Trix', rarity: 'Raro', color: '#00FF88', emoji: '💻',
    hp: 7000, speed: 3.2, attackRange: 400, attackDamage: 2000, attackCooldown: 50,
    superDamage: 0, superRange: 380, superCooldown: 110,
    attackColor: '#00FF88', superColor: '#00AAFF',
    desc: 'Hacker digital. Láser verde potente.',
    drawFn: drawTrix
  }
};

let p1Choice = null, p2Choice = null;
let gameState = 'select';
let p1, p2, projectiles, particles;
let keys = {};

document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

function makeCards(containerId, playerNum) {
  const c = document.getElementById(containerId);
  Object.entries(CHARS).forEach(([key, ch]) => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.innerHTML = `<div class="char-emoji">${ch.emoji}</div><div class="char-card-name">${ch.name}</div><div class="char-card-rarity rarity-${ch.rarity.toLowerCase()}">${ch.rarity}</div><div class="char-card-desc">${ch.desc}</div>`;
    card.onclick = () => {
      c.querySelectorAll('.char-card').forEach(x => x.classList.remove('selected'));
      card.classList.add('selected');
      if(playerNum === 1) p1Choice = key;
      else p2Choice = key;
      checkReady();
    };
    c.appendChild(card);
  });
}
function checkReady() {
  document.getElementById('startBtn').disabled = !(p1Choice && p2Choice);
}
makeCards('p1cards', 1);
makeCards('p2cards', 2);

document.getElementById('startBtn').onclick = startGame;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function createPlayer(charKey, x, y, isP1) {
  const ch = CHARS[charKey];
  return {
    x, y, vx: 0, vy: 0,
    hp: ch.hp, maxHp: ch.hp,
    superCharge: 0, maxSuper: 300,
    attackTimer: 0, superTimer: 0,
    char: ch, key: charKey,
    isP1, facing: isP1 ? 1 : -1,
    hitFlash: 0,
    lastAttackX: x, lastAttackY: y
  };
}

function startGame() {
  document.getElementById('charSelect').style.display = 'none';
  canvas.style.display = 'block';
  document.getElementById('p1name').textContent = CHARS[p1Choice].name.toUpperCase();
  document.getElementById('p2name').textContent = CHARS[p2Choice].name.toUpperCase();
  document.getElementById('p1hp').style.background = CHARS[p1Choice].color;
  document.getElementById('p2hp').style.background = CHARS[p2Choice].color;
  p1 = createPlayer(p1Choice, canvas.width * 0.25, canvas.height * 0.5, true);
  p2 = createPlayer(p2Choice, canvas.width * 0.75, canvas.height * 0.5, false);
  projectiles = [];
  particles = [];
  gameState = 'playing';
  loop();
}

function loop() {
  if(gameState !== 'playing') return;
  update();
  draw();
  requestAnimationFrame(loop);
}

const ARENA_PAD = 60;

function update() {
  const W = canvas.width, H = canvas.height;
  // P1 movement WASD
  let p1dx = 0, p1dy = 0;
  if(keys['KeyA']) p1dx -= 1;
  if(keys['KeyD']) p1dx += 1;
  if(keys['KeyW']) p1dy -= 1;
  if(keys['KeyS']) p1dy += 1;
  // P2 movement Arrows
  let p2dx = 0, p2dy = 0;
  if(keys['ArrowLeft']) p2dx -= 1;
  if(keys['ArrowRight']) p2dx += 1;
  if(keys['ArrowUp']) p2dy -= 1;
  if(keys['ArrowDown']) p2dy += 1;

  movePlayer(p1, p1dx, p1dy, W, H);
  movePlayer(p2, p2dx, p2dy, W, H);

  // Facing
  if(p1dx !== 0) p1.facing = p1dx > 0 ? 1 : -1;
  if(p2dx !== 0) p2.facing = p2dx > 0 ? 1 : -1;

  // Timers
  if(p1.attackTimer > 0) p1.attackTimer--;
  if(p2.attackTimer > 0) p2.attackTimer--;
  if(p1.superTimer > 0) p1.superTimer--;
  if(p2.superTimer > 0) p2.superTimer--;
  if(p1.hitFlash > 0) p1.hitFlash--;
  if(p2.hitFlash > 0) p2.hitFlash--;

  // P1 attack F
  if(keys['KeyF'] && p1.attackTimer === 0) { fireAttack(p1, p2); p1.attackTimer = p1.char.attackCooldown; }
  // P1 ulti G
  if(keys['KeyG'] && p1.superTimer === 0 && p1.superCharge >= p1.maxSuper) { fireSuper(p1, p2); p1.superTimer = p1.char.superCooldown; p1.superCharge = 0; }
  // P2 attack L
  if(keys['KeyL'] && p2.attackTimer === 0) { fireAttack(p2, p1); p2.attackTimer = p2.char.attackCooldown; }
  // P2 ulti ;
  if((keys['Semicolon'] || keys['IntlRoLocale']) && p2.superTimer === 0 && p2.superCharge >= p2.maxSuper) { fireSuper(p2, p1); p2.superTimer = p2.char.superCooldown; p2.superCharge = 0; }

  // Update projectiles
  for(let i = projectiles.length - 1; i >= 0; i--) {
    const proj = projectiles[i];
    proj.x += proj.vx;
    proj.y += proj.vy;
    proj.life--;
    const target = proj.owner === p1 ? p2 : p1;
    const dx = target.x - proj.x, dy = target.y - proj.y;
    if(Math.sqrt(dx*dx+dy*dy) < 28) {
      dealDamage(target, proj.damage, proj.owner);
      spawnParticles(target.x, target.y, proj.color, 8);
      projectiles.splice(i, 1);
    } else if(proj.life <= 0 || proj.x < 0 || proj.x > W || proj.y < 0 || proj.y > H) {
      projectiles.splice(i, 1);
    }
  }

  // Particles
  for(let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life--; p.vy += 0.1;
    if(p.life <= 0) particles.splice(i, 1);
  }

  // Update HUD
  document.getElementById('p1hp').style.width = Math.max(0, (p1.hp/p1.maxHp)*100) + '%';
  document.getElementById('p2hp').style.width = Math.max(0, (p2.hp/p2.maxHp)*100) + '%';
  document.getElementById('p1super').style.width = Math.min(100, (p1.superCharge/p1.maxSuper)*100) + '%';
  document.getElementById('p2super').style.width = Math.min(100, (p2.superCharge/p2.maxSuper)*100) + '%';

  // Check win
  if(p1.hp <= 0 || p2.hp <= 0) {
    gameState = 'over';
    const winner = p1.hp > p2.hp ? p1.char.name : p2.char.name;
    showMessage(`¡${winner.toUpperCase()} GANA! 🏆`, 3000);
    setTimeout(() => { gameState = 'select'; document.getElementById('charSelect').style.display = 'flex'; }, 3500);
  }

  // Super charge from movement
  p1.superCharge = Math.min(p1.maxSuper, p1.superCharge + 0.3);
  p2.superCharge = Math.min(p2.maxSuper, p2.superCharge + 0.3);
}

function movePlayer(pl, dx, dy, W, H) {
  const len = Math.sqrt(dx*dx+dy*dy);
  if(len > 0) { dx /= len; dy /= len; }
  pl.x = Math.max(ARENA_PAD+22, Math.min(W-ARENA_PAD-22, pl.x + dx * pl.char.speed));
  pl.y = Math.max(ARENA_PAD+22, Math.min(H-ARENA_PAD-22, pl.y + dy * pl.char.speed));
}

function fireAttack(attacker, defender) {
  const ch = attacker.char;
  const dx = defender.x - attacker.x, dy = defender.y - attacker.y;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if(ch.attackRange >= 200) {
    // Ranged - shoot projectile
    const speed = 7;
    projectiles.push({ x: attacker.x, y: attacker.y, vx: (dx/dist)*speed, vy: (dy/dist)*speed, damage: ch.attackDamage, owner: attacker, color: ch.attackColor, life: 70 });
    spawnParticles(attacker.x, attacker.y, ch.attackColor, 4);
  } else {
    // Melee
    if(dist < ch.attackRange) {
      dealDamage(defender, ch.attackDamage, attacker);
      spawnParticles(defender.x, defender.y, ch.attackColor, 10);
    }
  }
}

function fireSuper(attacker, defender) {
  const ch = attacker.char;
  if(attacker.key === 'troy') {
    // Lasso - pull enemy
    const dx = attacker.x - defender.x, dy = attacker.y - defender.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    defender.x += (dx/dist)*180; defender.y += (dy/dist)*180;
    dealDamage(defender, ch.superDamage, attacker);
    spawnParticles(defender.x, defender.y, ch.superColor, 15);
    showMessage('¡CUERDA DEL TROY!', 1000);
  } else if(attacker.key === 'ragnar') {
    // Howl - pull all enemies
    const dx = attacker.x - defender.x, dy = attacker.y - defender.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    defender.x += (dx/dist)*220; defender.y += (dy/dist)*220;
    spawnParticles(attacker.x, attacker.y, ch.superColor, 20);
    showMessage('¡AULLIDO DE RAGNAR!', 1000);
  } else if(attacker.key === 'trix') {
    // Hack - disable basics for 3s
    defender.attackTimer = Math.max(defender.attackTimer, 180);
    spawnParticles(defender.x, defender.y, ch.superColor, 18);
    showMessage('¡HACKEO! Sin básicos 3s', 1000);
  }
}

function dealDamage(target, dmg, attacker) {
  target.hp = Math.max(0, target.hp - dmg);
  target.hitFlash = 10;
  attacker.superCharge = Math.min(attacker.maxSuper, attacker.superCharge + 60);
}

function spawnParticles(x, y, color, count) {
  for(let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, color, life: 20 + Math.random()*20, size: 2+Math.random()*4 });
  }
}

function showMessage(txt, duration) {
  const el = document.getElementById('message');
  el.textContent = txt;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, duration);
}

// Draw
function draw() {
  const W = canvas.width, H = canvas.height;
  // Background - arena
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  grad.addColorStop(0, '#1e0a3c');
  grad.addColorStop(1, '#0a0015');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Arena floor pattern
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for(let x = ARENA_PAD; x < W-ARENA_PAD; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, ARENA_PAD); ctx.lineTo(x, H-ARENA_PAD); ctx.stroke();
  }
  for(let y = ARENA_PAD; y < H-ARENA_PAD; y += 60) {
    ctx.beginPath(); ctx.moveTo(ARENA_PAD, y); ctx.lineTo(W-ARENA_PAD, y); ctx.stroke();
  }

  // Arena border
  ctx.strokeStyle = 'rgba(255,215,0,0.3)';
  ctx.lineWidth = 2;
  ctx.strokeRect(ARENA_PAD, ARENA_PAD, W-ARENA_PAD*2, H-ARENA_PAD*2);

  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.setLineDash([10, 10]);
  ctx.beginPath(); ctx.moveTo(W/2, ARENA_PAD); ctx.lineTo(W/2, H-ARENA_PAD); ctx.stroke();
  ctx.setLineDash([]);

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 40;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Projectiles
  projectiles.forEach(proj => {
    ctx.save();
    ctx.shadowColor = proj.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = proj.color;
    ctx.beginPath(); ctx.arc(proj.x, proj.y, 5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Players
  drawPlayer(p1);
  drawPlayer(p2);

  // Attack range indicator (subtle)
  if(keys['KeyF'] || keys['KeyG']) { ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.char.attackRange, 0, Math.PI*2); ctx.stroke(); }
}

function drawPlayer(pl) {
  ctx.save();
  ctx.translate(pl.x, pl.y);

  // Hit flash
  if(pl.hitFlash > 0) {
    ctx.globalAlpha = 0.8;
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI*2); ctx.stroke();
  }

  // Shadow
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, 22, 20, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  pl.char.drawFn(ctx, pl);

  // Name above
  ctx.fillStyle = pl.char.color;
  ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(pl.char.name.toUpperCase(), 0, -38);

  ctx.restore();
}

function drawTroy(ctx, pl) {
  const s = pl.facing;
  // Horse body
  ctx.fillStyle = '#8B5E3C';
  ctx.beginPath(); ctx.ellipse(0, 8, 20, 14, 0, 0, Math.PI*2); ctx.fill();
  // Horse head
  ctx.fillStyle = '#7A5230';
  ctx.beginPath(); ctx.ellipse(s*18, 0, 10, 8, s*0.3, 0, Math.PI*2); ctx.fill();
  // Rider
  ctx.fillStyle = '#4A3728';
  ctx.beginPath(); ctx.ellipse(0, -8, 10, 12, 0, 0, Math.PI*2); ctx.fill();
  // Hat
  ctx.fillStyle = '#2E1F0F';
  ctx.fillRect(-10, -22, 20, 5);
  ctx.beginPath(); ctx.ellipse(0, -24, 7, 4, 0, 0, Math.PI*2); ctx.fill();
  // Lasso (attack animation)
  ctx.strokeStyle = '#D4A843';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(s*12, -10, 8, 0, Math.PI*2); ctx.stroke();
}

function drawRagnar(ctx, pl) {
  const s = pl.facing;
  // Body - wolf
  ctx.fillStyle = '#2D2D3A';
  ctx.beginPath(); ctx.ellipse(0, 4, 16, 18, 0, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle = '#3D3D4A';
  ctx.beginPath(); ctx.arc(0, -14, 14, 0, Math.PI*2); ctx.fill();
  // Ears
  ctx.fillStyle = '#2D2D3A';
  ctx.beginPath(); ctx.moveTo(-8, -24); ctx.lineTo(-14, -34); ctx.lineTo(-2, -28); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(8, -24); ctx.lineTo(14, -34); ctx.lineTo(2, -28); ctx.closePath(); ctx.fill();
  // Eyes
  ctx.fillStyle = '#FF2222';
  ctx.beginPath(); ctx.arc(-5, -15, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -15, 3, 0, Math.PI*2); ctx.fill();
  // Scarf
  ctx.fillStyle = '#8B0000';
  ctx.beginPath(); ctx.ellipse(0, -4, 12, 5, 0, 0, Math.PI*2); ctx.fill();
  // Claws
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2;
  for(let i = -1; i <= 1; i++) {
    ctx.beginPath(); ctx.moveTo(s*18 + i*4, 8); ctx.lineTo(s*22 + i*4, 14); ctx.stroke();
  }
}

function drawTrix(ctx, pl) {
  const s = pl.facing;
  // Body - hoodie
  ctx.fillStyle = '#1A1A1A';
  ctx.beginPath(); ctx.ellipse(0, 4, 14, 17, 0, 0, Math.PI*2); ctx.fill();
  // Hood
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(0, -14, 13, Math.PI, 0, false); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -14, 13, 0, Math.PI, false); ctx.lineTo(-13,-14); ctx.fill();
  // Face (dark)
  ctx.fillStyle = '#0A0A0A';
  ctx.beginPath(); ctx.ellipse(0, -14, 9, 10, 0, 0, Math.PI*2); ctx.fill();
  // Glowing eyes
  ctx.shadowColor = '#00FF88';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#00FF88';
  ctx.beginPath(); ctx.arc(-4, -14, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -14, 3, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // Arm with finger laser
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(s*16, 0); ctx.stroke();
  ctx.fillStyle = '#00FF88';
  ctx.beginPath(); ctx.arc(s*17, 0, 3, 0, Math.PI*2); ctx.fill();
}
